# https://github.com/golangci/golangci-lint-action

name: golangci-lint

on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GOPATH: $HOME/go
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23

      - name: Clean Go Cache Directory
        run: |
          rm -rf $GOPATH/pkg/mod
          mkdir -p $GOPATH/pkg/mod

      - name: Restore Cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/go-build
          key: go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}

      - name: Install Dependencies
        run: go mod download

      - name: Run Linter
        run: golangci-lint run
